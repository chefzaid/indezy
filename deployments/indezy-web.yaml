---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indezy-web
  namespace: application
  labels:
    app: indezy-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indezy-web
  template:
    metadata:
      labels:
        app: indezy-web
    spec:
      containers:
        - name: indezy-web
          image: nexus.swirlit.dev:5000/indezy/indezy-web:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              # /health is served by the custom nginx.conf (returns 200 "healthy")
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: indezy-web
  namespace: application
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: indezy-web
