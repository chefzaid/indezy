---
# Credentials for the shared infrastructure postgres admin user (appuser).
# Used only by the setup Job below.
# The password value must match postgres-secret.POSTGRES_PASSWORD in the
# infrastructure namespace. Default value: base64("mypassword").
# Update this if the infrastructure postgres password has been rotated.
apiVersion: v1
kind: Secret
metadata:
  name: indezy-db-admin-credentials
  namespace: application
type: Opaque
data:
  POSTGRES_ADMIN_PASSWORD: bXlwYXNzd29yZA==

---
# One-time Job: provisions the `indezy` database and `indezy_user` inside the
# shared PostgreSQL instance that runs in the infrastructure namespace.
# ArgoCD will apply this Job on first sync. Kubernetes does not re-run completed
# Jobs, so it is safe to leave in the manifests directory.
apiVersion: batch/v1
kind: Job
metadata:
  name: indezy-db-setup
  namespace: application
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-setup
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -e
              export PGPASSWORD="${POSTGRES_ADMIN_PASSWORD}"
              PSQL="psql -h postgres.infrastructure.svc.cluster.local -U appuser -d appdb"

              echo "Creating indezy_user if not exists, ensuring password is current..."
              $PSQL -c "DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'indezy_user') THEN
                  CREATE ROLE indezy_user LOGIN PASSWORD '${INDEZY_DB_PASSWORD}';
                ELSE
                  ALTER ROLE indezy_user PASSWORD '${INDEZY_DB_PASSWORD}';
                END IF;
              END
              \$\$;"

              echo "Creating indezy database if not exists..."
              $PSQL -tc "SELECT 1 FROM pg_database WHERE datname='indezy'" | grep -q 1 || \
                $PSQL -c "CREATE DATABASE indezy OWNER indezy_user;"

              echo "Granting connect and schema privileges, enabling extensions..."
              $PSQL -c "GRANT CONNECT ON DATABASE indezy TO indezy_user;"
              PGPASSWORD="${INDEZY_DB_PASSWORD}" psql \
                -h postgres.infrastructure.svc.cluster.local \
                -U indezy_user -d indezy <<-SQL
                  GRANT ALL ON SCHEMA public TO indezy_user;
                  CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
              SQL

              echo "Database setup complete."
          env:
            - name: POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indezy-db-admin-credentials
                  key: POSTGRES_ADMIN_PASSWORD
            - name: INDEZY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indezy-server-secret
                  key: DB_PASSWORD
