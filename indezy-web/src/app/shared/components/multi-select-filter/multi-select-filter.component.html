<div class="multi-select-filter" [formGroup]="selectForm">
  <mat-form-field appearance="outline" class="select-field">
    <mat-label>{{ config.label || 'Sélectionner' }}</mat-label>
    <mat-select formControlName="selection"
      [placeholder]="config.placeholder || 'Choisir des options'"
      (selectionChange)="onSelectionChange($event.value)">
      @for (option of availableOptions; track option) {
        <mat-option
          [value]="option.value"
          [disabled]="option.disabled">
          {{ option.label }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (selectedValues.length > 0) {
    <div class="selected-items">
      <mat-chip-listbox>
        @for (value of selectedValues; track value) {
          <mat-chip-option
            (removed)="removeSelection(value)">
            {{ getOptionLabel(value) }}
            <mat-icon matChipRemove>cancel</mat-icon>
          </mat-chip-option>
        }
      </mat-chip-listbox>
    </div>
  }

  @if (selectedValues.length > 0) {
    <div class="filter-actions">
      <button mat-button
        (click)="clearAll()"
        class="clear-button">
        <mat-icon>clear_all</mat-icon>
        Tout effacer
      </button>
    </div>
  }
</div>
