<div class="filter-presets">
  <div class="preset-actions">
    <button mat-button
      [matMenuTriggerFor]="presetsMenu"
      class="presets-button">
      <mat-icon>bookmark</mat-icon>
      {{ 'filters.presetFilters' | translate }}
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    @if (config.allowCustomPresets && hasActiveFilters) {
      <button mat-icon-button
        (click)="saveCurrentAsPreset()"
        matTooltip="{{ 'filters.saveCurrentFilters' | translate }}"
        class="save-preset-button">
        <mat-icon>bookmark_add</mat-icon>
      </button>
    }
  </div>

  <mat-menu #presetsMenu="matMenu" class="presets-menu">
    <div class="preset-header">
      <span class="preset-title">{{ 'filters.presetFilters' | translate }}</span>
    </div>

    <div class="preset-list">
      @for (preset of presets; track preset) {
        <button mat-menu-item
          (click)="applyPreset(preset)"
          class="preset-item">
          <mat-icon>{{ preset.isDefault ? 'star' : 'bookmark' }}</mat-icon>
          <div class="preset-info">
            <span class="preset-name">{{ preset.name }}</span>
            @if (preset.description) {
              <span class="preset-description">
                {{ preset.description }}
              </span>
            }
          </div>
          @if (!preset.isDefault && config.allowCustomPresets) {
            <button mat-icon-button
              (click)="deletePreset(preset, $event)"
              class="delete-preset">
              <mat-icon>delete</mat-icon>
            </button>
          }
        </button>
      }
    </div>

    @if (config.allowCustomPresets) {
      <div class="preset-footer">
        @if (customPresets.length > 0) {
          <button mat-menu-item
            (click)="clearAllPresets()"
            class="clear-presets">
            <mat-icon>clear_all</mat-icon>
            {{ 'filters.clearAllCustom' | translate }}
          </button>
        }
      </div>
    }
  </mat-menu>
</div>
