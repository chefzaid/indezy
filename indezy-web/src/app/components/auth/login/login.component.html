<div class="login-container">
  <div class="login-card-container">
    <mat-card class="login-card">
      <mat-card-header>
        <div class="login-header">
          <img src="assets/images/indezy-logo.svg" alt="Indezy" class="login-logo" height="48">
          <mat-card-title class="login-title">
            {{ 'auth.loginTitle' | translate }}
          </mat-card-title>
          <mat-card-subtitle>
            {{ 'auth.loginSubtitle' | translate }}
          </mat-card-subtitle>
        </div>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'common.email' | translate }}</mat-label>
            <input matInput 
                   type="email" 
                   formControlName="email" 
                   placeholder="votre@email.com"
                   autocomplete="email">
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
              {{ getErrorMessage('email') }}
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'common.password' | translate }}</mat-label>
            <input matInput 
                   [type]="hidePassword ? 'password' : 'text'" 
                   formControlName="password"
                   autocomplete="current-password">
            <button mat-icon-button 
                    matSuffix 
                    type="button"
                    (click)="hidePassword = !hidePassword"
                    [attr.aria-label]="'auth.hidePassword' | translate"
                    [attr.aria-pressed]="hidePassword">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
              {{ getErrorMessage('password') }}
            </mat-error>
          </mat-form-field>

          <button mat-raised-button 
                  color="primary" 
                  type="submit" 
                  class="login-button full-width"
                  [disabled]="loginForm.invalid || isLoading">
            <mat-spinner *ngIf="isLoading" diameter="20" class="login-spinner"></mat-spinner>
            <span *ngIf="!isLoading">{{ 'auth.login' | translate }}</span>
            <span *ngIf="isLoading">{{ 'auth.loggingIn' | translate }}</span>
          </button>
        </form>
      </mat-card-content>

      <mat-card-actions class="login-actions">
        <p class="signup-link">
          {{ 'auth.noAccount' | translate }}
          <a routerLink="/register" class="signup-link-text">{{ 'auth.createAccount' | translate }}</a>
        </p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
