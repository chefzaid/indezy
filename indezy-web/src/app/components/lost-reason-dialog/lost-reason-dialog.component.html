<div class="lost-reason-dialog">
  <h2 mat-dialog-title>
    <mat-icon>thumb_down</mat-icon>
    {{ 'kanban.lost.title' | translate }}
  </h2>

  <mat-dialog-content>
    <p class="project-role">{{ data.role }}</p>
    <p class="hint">{{ 'kanban.lost.hint' | translate }}</p>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'kanban.lost.reason' | translate }}</mat-label>
      <mat-select [(ngModel)]="selectedReason">
        <mat-option *ngFor="let reason of reasons" [value]="reason">
          {{ 'kanban.lost.reasons.' + reason | translate }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">
      {{ 'common.cancel' | translate }}
    </button>
    <button mat-raised-button color="warn" type="button" (click)="confirm()">
      <mat-icon>thumb_down</mat-icon>
      {{ 'kanban.lost.confirm' | translate }}
    </button>
  </mat-dialog-actions>
</div>
