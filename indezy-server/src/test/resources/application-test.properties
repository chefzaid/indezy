# Test configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# 'create' (not 'create-drop'): the integration tests share one in-memory DB across
# Spring contexts. create-drop's drop-on-shutdown (fired by @DirtiesContext teardown)
# would wipe the shared schema, so a later test reusing a cached context finds no tables.
# 'create' rebuilds the schema on each context startup and never drops it on shutdown;
# each test re-seeds its own data via @Sql, so this keeps tests order-independent.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Disable security for tests
spring.security.enabled=false

# Disable JPA auditing for tests
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Security: required for unauthenticated TestRestTemplate calls in integration tests.
indezy.security.permit-all=true
